<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Banking Simulator - Test Environment</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0a192f;
            color: #e6f1ff;
            margin: 0;
            padding: 30px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #172a45;
            padding-bottom: 20px;
        }
        header h1 {
            color: #64ffda;
            margin-bottom: 5px;
            font-size: 28px;
        }
        header p {
            color: #8892b0;
            margin-top: 0;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        .card {
            background-color: #112240;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px -15px rgba(2,12,27,0.7);
            border: 1px solid #233554;
        }
        .card h2 {
            margin-top: 0;
            color: #ccd6f6;
            font-size: 20px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #8892b0;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background-color: #0a192f;
            border: 1px solid #233554;
            border-radius: 6px;
            color: #e6f1ff;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #64ffda;
        }
        button {
            background-color: #64ffda;
            color: #0a192f;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #52d1b2;
            transform: translateY(-2px);
        }
        .test-list {
            max-height: 480px;
            overflow-y: auto;
        }
        .test-item {
            background: #172a45;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 5px solid #64ffda;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .test-item.passed { border-left-color: #2ecc71; }
        .test-item.failed { border-left-color: #e74c3c; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .badge-passed { background-color: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .badge-failed { background-color: rgba(231, 76, 60, 0.2); color: #e74c3c; }

        .test-title {
            font-weight: bold;
            font-size: 16px;
            color: #ccd6f6;
            margin-bottom: 8px;
        }
        .test-details {
            font-size: 13px;
            color: #8892b0;
            line-height: 1.5;
        }
        .no-tests {
            text-align: center;
            color: #8892b0;
            margin-top: 50px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Interbank Transfer - QA Test Environment 🏦✨</h1>
            <p>Módulo de Pruebas Automatizadas y Validación de Reglas de Negocio Bancarias</p>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Simulador de App Bancaria</h2>
                <form id="transferForm">
                    <div class="form-group">
                        <label for="banco">Banco Destino:</label>
                        <select id="banco">
                            <option value="Interbank">Interbank</option>
                            <option value="BCP">BCP</option>
                            <option value="BBVA">BBVA</option>
                            <option value="Scotiabank">Scotiabank</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="cuenta">Número de Cuenta CCI (Debe tener 20 dígitos):</label>
                        <input type="text" id="cuenta" placeholder="Ej: 00319300321456789012" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="monto">Monto a Transferir ($):</label>
                        <input type="number" id="monto" placeholder="Ej: 350" required>
                    </div>

                    <button type="submit">Ejecutar Caso de Prueba 🚀</button>
                </form>
            </div>

            <div class="card">
                <h2>Log de Pruebas en Tiempo Real (QA Log)</h2>
                <div id="noTestsMessage" class="no-tests">Ninguna prueba ejecutada en este ciclo.</div>
                <div class="test-list" id="testContainer">
                    </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('transferForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Capturar campos
            const banco = document.getElementById('banco').value;
            const cuenta = document.getElementById('cuenta').value;
            const monto = parseFloat(document.getElementById('monto').value);

            // Ocultar mensaje inicial
            document.getElementById('noTestsMessage').style.display = 'none';

            let resultadoHTML = '';
            let estado = '';

            // --- LÓGICA DE JAVASCRIPT SIMULANDO VALIDACIONES DE QA ---
            if (cuenta.length !== 20) {
                // BUG ENCONTRADO: Cuenta no tiene 20 dígitos
                estado = 'failed';
                resultadoHTML = `
                    <span class="status-badge badge-failed">Test Failed 🔴</span>
                    <div class="test-title">Error en Validación de Cuenta CCI</div>
                    <div class="test-details">
                        <strong>Escenario:</strong> Transferencia a ${banco}<br>
                        <strong>Bug detectado:</strong> El sistema permitió enviar datos con ${cuenta.length} dígitos.<br>
                        <strong>Resultado Esperado:</strong> Mensaje de error bloqueante exigiendo exactamente 20 dígitos.<br>
                        <strong>Resultado Actual:</strong> El sistema falló en el backend lanzando un error inesperado.
                    </div>
                `;
            } else if (monto > 5000) {
                // BUG ENCONTRADO: Límite de seguridad bancaria excedido
                estado = 'failed';
                resultadoHTML = `
                    <span class="status-badge badge-failed">Test Failed 🔴</span>
                    <div class="test-title">Límite Diario Excedido sin Alerta</div>
                    <div class="test-details">
                        <strong>Escenario:</strong> Transferencia de $${monto}<br>
                        <strong>Bug detectado:</strong> El monto supera el límite de seguridad bancaria permitido ($5,000).<br>
                        <strong>Resultado Esperado:</strong> Bloqueo preventivo y solicitud de Token digital.<br>
                        <strong>Resultado Actual:</strong> El sistema procesó el monto peligroso sin restricciones de seguridad.
                    </div>
                `;
            } else {
                // TRANSFERENCIA EXITOSA
                estado = 'passed';
                resultadoHTML = `
                    <span class="status-badge badge-passed">Test Passed 🟢</span>
                    <div class="test-title">Transferencia Exitosa a ${banco}</div>
                    <div class="test-details">
                        <strong>Monto:</strong> $${monto} | <strong>Cuenta:</strong> ${cuenta}<br>
                        <strong>Resultado Esperado:</strong> Transacción exitosa con descuento correcto de fondos.<br>
                        <strong>Resultado Actual:</strong> Código de estado 200 OK. Fondos enviados de manera segura.
                    </div>
                `;
            }

            // Crear la tarjeta visual
            const testCard = document.createElement('div');
            testCard.classList.add('test-item', estado);
            testCard.innerHTML = resultadoHTML;

            // Insertar en la lista (arriba del todo)
            const contenedor = document.getElementById('testContainer');
            contenedor.insertBefore(testCard, contenedor.firstChild);

            // Limpiar formulario
            document.getElementById('transferForm').reset();
        });
    </script>

</body>
</html>
